<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动画展示 - 迁徙路线 - 鄱阳鹤影</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .animation-container {
            background: #fff;
            padding: 50px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        /* SVG迁徙路线图 */
        .migration-svg {
            width: 100%;
            max-width: 700px;
            height: 500px;
            display: block;
            margin: 0 auto;
        }

        /* 路线描边动画 */
        .route-line {
            fill: none;
            stroke: #D4A76A;
            stroke-width: 3;
            stroke-dasharray: 1500;
            stroke-dashoffset: 1500;
            animation: drawRoute 5s ease forwards;
        }

        @keyframes drawRoute {
            to { stroke-dashoffset: 0; }
        }

        /* 候鸟沿路线移动 */
        .migrating-bird {
            animation: moveAlongRoute 5s ease forwards;
        }

        @keyframes moveAlongRoute {
            0% { transform: translate(80px, 430px); opacity: 0; }
            10% { opacity: 1; }
            40% { transform: translate(250px, 300px); }
            70% { transform: translate(400px, 150px); }
            100% { transform: translate(550px, 80px); opacity: 1; }
        }

        /* 地点标记脉冲 */
        .location-dot {
            animation: pulse 2s ease-in-out infinite;
        }

        .location-dot:nth-child(2) { animation-delay: 0.3s; }
        .location-dot:nth-child(3) { animation-delay: 0.6s; }
        .location-dot:nth-child(4) { animation-delay: 0.9s; }

        @keyframes pulse {
            0%, 100% { r: 6; opacity: 1; }
            50% { r: 12; opacity: 0.5; }
        }

        /* 路线节点标签动画 */
        .label-fade {
            animation: fadeInLabel 1s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInLabel {
            to { opacity: 1; }
        }

        .description {
            margin-top: 30px;
            color: #2E86AB;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="header">
        <div class="container">
            <div id="logo"><span id="logo-icon">🪶</span>鄱阳鹤影</div>
            <div id="main-nav">
                <ul>
                    <li><a href="../../index.html">首页</a></li>
                    <li><a href="../../pages/migration.html">迁徙路线</a></li>
                    <li><a href="animation1.html">动画一</a></li>
                    <li><a href="animation2.html">动画二</a></li>
                </ul>
            </div>
        </div>
    </div>

    <div class="breadcrumb">
        <div class="container">
            <a href="../../index.html">首页</a><span>&gt;</span><strong>动画展示二：迁徙路线</strong>
        </div>
    </div>

    <div class="page-header">
        <div class="container">
            <h1>动画展示二</h1>
            <p>白鹤迁徙路线图（SVG路径描边 + 候鸟沿路线移动动画）</p>
        </div>
    </div>

    <div class="content-section">
        <div class="container">
            <div class="animation-container">
                <svg class="migration-svg" viewBox="0 0 700 500">
                    <!-- 背景色 -->
                    <rect width="700" height="500" fill="#F0F6F9" rx="10"/>
                    
                    <!-- 网格线 -->
                    <line x1="0" y1="250" x2="700" y2="250" stroke="#ddd" stroke-width="0.5"/>
                    <line x1="350" y1="0" x2="350" y2="500" stroke="#ddd" stroke-width="0.5"/>
                    
                    <!-- 迁徙路线（从西伯利亚到鄱阳湖） -->
                    <path class="route-line" d="M80,430 
                             Q120,400 180,380 
                             Q220,360 280,310 
                             Q320,270 350,220 
                             Q380,170 420,130 
                             Q470,90 550,80"/>
                    
                    <!-- 路线节点 -->
                    <circle class="location-dot" cx="80" cy="430" r="8" fill="#2E86AB"/>
                    <circle class="location-dot" cx="220" cy="360" r="6" fill="#D4A76A"/>
                    <circle class="location-dot" cx="350" cy="220" r="6" fill="#D4A76A"/>
                    <circle class="location-dot" cx="550" cy="80" r="10" fill="#C0392B"/>
                    
                    <!-- 地点标签 -->
                    <text class="label-fade" x="70" y="460" fill="#2E86AB" font-size="14" font-weight="bold" text-anchor="middle">西伯利亚繁殖地</text>
                    <text class="label-fade" x="220" y="390" fill="#666" font-size="12" text-anchor="middle" style="animation-delay: 1s;">扎龙保护区</text>
                    <text class="label-fade" x="350" y="200" fill="#666" font-size="12" text-anchor="middle" style="animation-delay: 2s;">黄河三角洲</text>
                    <text class="label-fade" x="550" y="60" fill="#C0392B" font-size="14" font-weight="bold" text-anchor="middle" style="animation-delay: 3s;">鄱阳湖越冬地</text>
                    
                    <!-- 距离标注 -->
                    <text class="label-fade" x="300" y="430" fill="#999" font-size="11" text-anchor="middle" style="animation-delay: 4s;">全程约 5000 公里</text>
                    
                    <!-- 移动的候鸟图标 -->
                    <text class="migrating-bird" font-size="24" text-anchor="middle">🕊️</text>
                    
                    <!-- 鄱阳湖标记 -->
                    <rect x="500" y="60" width="100" height="40" rx="20" fill="#2E86AB" opacity="0.15" style="animation-delay: 4s;"/>
                    
                    <!-- 方向箭头 -->
                    <polygon points="350,280 340,290 350,285 360,290" fill="#D4A76A" opacity="0.6"/>
                    <polygon points="450,160 440,170 450,165 460,170" fill="#D4A76A" opacity="0.6"/>
                </svg>
                <p class="description">技术说明：使用CSS3 @keyframes + SVG stroke-dasharray/stroke-dashoffset 实现迁徙路线描边动画，配合候鸟图标沿路线移动</p>
            </div>
        </div>
    </div>
